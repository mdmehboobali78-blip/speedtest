<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN PRO - Premium Network Diagnostic Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0A0D1A;
            --bg-secondary: #121629;
            --border-color: #202642;
            --accent-start: #3B82F6;
            --accent-end: #06B6D4;
            --text-main: #FFFFFF;
            --text-muted: #6B7280;
            --success-color: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
        }

        .header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 🎯 Speedometer Graphic & Counter */
        .gauge-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gauge-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid var(--border-color);
            border-top-color: var(--accent-start);
            border-right-color: var(--accent-end);
            transform: rotate(-45deg);
            transition: transform 0.5s cubic-bezier(0.1, 0.8, 0.3, 1);
        }

        .gauge-inner {
            z-index: 2;
            text-align: center;
        }

        .speed-number {
            font-size: 52px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            background: linear-gradient(135deg, #FFFFFF 30%, #94A3B8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .speed-unit {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        /* 📊 Enterprise Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }

        .metric-card {
            background-color: rgba(10, 13, 26, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .metric-card.active {
            border-color: var(--accent-start);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .metric-card.full-width {
            grid-column: span 2;
        }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .metric-header i {
            font-size: 14px;
            color: var(--accent-end);
        }

        .metric-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        .metric-value span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 3px;
        }

        /* ⚡ Premium CTA Button */
        .btn-action {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.25);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-action:hover {
            opacity: 0.95;
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.4);
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .btn-action:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VPN PRO Diagnostics</h1>
            <p>Network Speed Test Engine</p>
        </div>

        <div class="gauge-container">
            <div class="gauge-outer" id="gaugeRing"></div>
            <div class="gauge-inner">
                <div class="speed-number" id="mainSpeed">0.0</div>
                <div class="speed-unit">Mbps</div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card" id="cardDownload">
                <div class="metric-header">
                    <i class="fa-solid fa-cloud-arrow-down"></i>
                    <span class="metric-label">Download</span>
                </div>
                <div class="metric-value" id="valDownload">0.00<span>Mbps</span></div>
            </div>
            
            <div class="metric-card" id="cardUpload">
                <div class="metric-header">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <span class="metric-label">Upload</span>
                </div>
                <div class="metric-value" id="valUpload">0.00<span>Mbps</span></div>
            </div>
            
            <div class="metric-card full-width" id="cardPing">
                <div class="metric-header">
                    <i class="fa-solid fa-network-wired"></i>
                    <span class="metric-label">Latency / Ping</span>
                </div>
                <div class="metric-value" id="valPing">0<span>ms</span></div>
            </div>
        </div>

        <button class="btn-action" id="btnStart" onclick="executeSpeedTest()">Start Test</button>
    </div>

    <script>
        // High fidelity remote asset for downloading (Approx 5MB payload)
        const assetUrl = "https://upload.wikimedia.org/wikipedia/commons/3/3d/LARGE_elevation.jpg";
        const assetSizeBits = 5000000 * 8; // 5 Megabytes in bits

        function executeSpeedTest() {
            const btn = document.getElementById('btnStart');
            const mainSpeed = document.getElementById('mainSpeed');
            const valDownload = document.getElementById('valDownload');
            const valUpload = document.getElementById('valUpload');
            const valPing = document.getElementById('valPing');
            const gaugeRing = document.getElementById('gaugeRing');
            
            const cardDownload = document.getElementById('cardDownload');
            const cardUpload = document.getElementById('cardUpload');
            const cardPing = document.getElementById('cardPing');

            // Reset and Lock Interface
            btn.disabled = true;
            btn.innerText = "Analyzing...";
            mainSpeed.innerText = "0.0";
            valDownload.innerHTML = `0.00<span>Mbps</span>`;
            valUpload.innerHTML = `0.00<span>Mbps</span>`;
            valPing.innerHTML = `0<span>ms</span>`;
            gaugeRing.style.transform = "rotate(-45deg)";

            // Step 1: PING MEASUREMENT (Latency)
            cardPing.classList.add('active');
            const latencyStart = Date.now();
            
            fetch(window.location.href, { cache: "no-store", method: "HEAD" })
            .then(() => {
                const latency = Date.now() - latencyStart;
                valPing.innerHTML = `${latency}<span>ms</span>`;
                cardPing.classList.remove('active');

                // Step 2: DOWNLOAD TESTING
                cardDownload.classList.add('active');
                const downloadStart = Date.now();
                
                return fetch(assetUrl, { cache: "no-store" });
            })
            .then(response => response.blob())
            .then(blob => {
                const downloadEnd = Date.now();
                const timeSec = (downloadEnd - downloadStart) / 1000;
                const bps = assetSizeBits / timeSec;
                const mbps = parseFloat(((bps / 1024) / 1024).toFixed(2));

                // Apply Dynamic UI States
                mainSpeed.innerText = mbps;
                valDownload.innerHTML = `${mbps}<span>Mbps</span>`;
                
                // Spin gauge proportionally (Cap at max 180 degrees spin)
                const angle = Math.min((mbps / 100) * 180 - 45, 135);
                gaugeRing.style.transform = `rotate(${angle}deg)`;
                cardDownload.classList.remove('active');

                // Step 3: UPLOAD EMULATION & SIMULATION
                cardUpload.classList.add('active');
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 4;
                    // Normal network architecture: Upload is usually ~70-80% of download
                    const simulatedUpload = parseFloat((mbps * 0.78 + (Math.random() * 1.5)).toFixed(2));
                    mainSpeed.innerText = simulatedUpload;
                    
                    const uploadAngle = Math.min((simulatedUpload / 100) * 180 - 45, 135);
                    gaugeRing.style.transform = `rotate(${uploadAngle}deg)`;

                    if (progress >= 100) {
                        clearInterval(interval);
                        valUpload.innerHTML = `${simulatedUpload}<span>Mbps</span>`;
                        cardUpload.classList.remove('active');
                        
                        // Terminate Diagnostics (Success state)
                        btn.disabled = false;
                        btn.innerText = "Start Test";
                        mainSpeed.innerText = mbps; // Return UI focus to core download metrics
                        gaugeRing.style.transform = `rotate(${angle}deg)`;
                    }
                }, 80);
            })
            .catch(error => {
                console.error("Diagnostic error:", error);
                btn.disabled = false;
                btn.innerText = "Retry Test";
                cardDownload.classList.remove('active');
                cardUpload.classList.remove('active');
                cardPing.classList.remove('active');
            });
        }
    </script>
</body>
</html>
