<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN PRO - Pure Real Diagnostic</title>
    <style>
        :root {
            --bg-primary: #0A0D1A;
            --bg-secondary: #121629;
            --border-color: #202642;
            --accent-start: #3B82F6;
            --accent-end: #06B6D4;
            --text-main: #FFFFFF;
            --text-muted: #6B7280;
            --error-color: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .gauge-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gauge-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid var(--border-color);
            border-top-color: var(--accent-start);
            border-right-color: var(--accent-end);
            transform: rotate(-45deg);
            transition: transform 0.2s ease-out;
        }

        .speed-number {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .speed-unit {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }

        .metric-card {
            background-color: rgba(10, 13, 26, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            text-align: left;
        }

        .metric-card.active {
            border-color: var(--accent-start);
        }

        .metric-card.full-width {
            grid-column: span 2;
        }

        .metric-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .metric-value-primary {
            font-size: 18px;
            font-weight: 700;
        }

        .metric-value-secondary {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .btn-action {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.25);
            text-transform: uppercase;
        }

        .btn-action:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        #errorMessage {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 10px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VPN PRO</h1>
            <p>100% Verification Engine</p>
        </div>

        <div class="gauge-container">
            <div class="gauge-outer" id="gaugeRing"></div>
            <div class="gauge-inner">
                <div class="speed-number" id="mainSpeed">0</div>
                <div class="speed-unit" id="mainUnit">KB/s</div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card" id="cardDownload">
                <div class="metric-label">⬇️ Download</div>
                <div class="metric-value-primary" id="dlBytes">0 KB/s</div>
                <div class="metric-value-secondary" id="dlBits">0.00 Mbps</div>
            </div>
            
            <div class="metric-card" id="cardUpload">
                <div class="metric-label">⬆️ Upload</div>
                <div class="metric-value-primary" id="ulBytes">0 KB/s</div>
                <div class="metric-value-secondary" id="ulBits">0.00 Mbps</div>
            </div>
            
            <div class="metric-card full-width" id="cardPing">
                <div class="metric-label">📡 Ping Latency</div>
                <div class="metric-value-primary" id="valPing">0 ms</div>
            </div>
        </div>

        <button class="btn-action" id="btnStart" onclick="startPureRealTest()">Run Honest Test</button>
        <div id="errorMessage">Network Error: Could not fetch real data pipelines.</div>
    </div>

    <script>
        async function startPureRealTest() {
            const btn = document.getElementById('btnStart');
            const mainSpeed = document.getElementById('mainSpeed');
            const mainUnit = document.getElementById('mainUnit');
            const dlBytes = document.getElementById('dlBytes');
            const dlBits = document.getElementById('dlBits');
            const ulBytes = document.getElementById('ulBytes');
            const ulBits = document.getElementById('ulBits');
            const valPing = document.getElementById('valPing');
            const gaugeRing = document.getElementById('gaugeRing');
            const errDiv = document.getElementById('errorMessage');

            // Reset States
            btn.disabled = true;
            btn.innerText = "MEASURING...";
            errDiv.style.display = "none";
            mainSpeed.innerText = "0";
            mainUnit.innerText = "KB/s";
            dlBytes.innerText = "0 KB/s";
            dlBits.innerText = "0.00 Mbps";
            ulBytes.innerText = "0 KB/s";
            ulBits.innerText = "0.00 Mbps";
            valPing.innerText = "0 ms";
            gaugeRing.style.transform = "rotate(-45deg)";

            // 1. PURE PING
            const pingStart = performance.now();
            try {
                // Ping to a reliable global tracking endpoint without CORS blocks
                await fetch('https://httpbin.org/get', { cache: 'no-store' });
                const pingTime = Math.round(performance.now() - pingStart);
                valPing.innerText = `${pingTime} ms`;
            } catch (e) {
                valPing.innerText = "Timeout/Error";
            }

            // 2. PURE DOWNLOAD (Bina kisi simulation ke actual byte check)
            const downloadUrl = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2500"; // Real 2.5MB target image
            const dlStart = performance.now();

            try {
                const response = await fetch(downloadUrl, { cache: 'no-store' });
                if (!response.ok) throw new Error("Network issue");
                
                const blob = await response.blob();
                const dlEnd = performance.now();
                
                const totalDurationSec = (dlEnd - dlStart) / 1000;
                const fileSizeBytes = blob.size;

                // Absolute true calculations
                const speedKBs = (fileSizeBytes / 1024) / totalDurationSec;
                const speedMbps = ((fileSizeBytes * 8) / totalDurationSec) / (1024 * 1024);

                // UI Processing (Exact numbers)
                if (speedKBs < 1024) {
                    mainSpeed.innerText = Math.round(speedKBs);
                    mainUnit.innerText = "KB/s";
                    dlBytes.innerText = `${Math.round(speedKBs)} KB/s`;
                } else {
                    const speedMBs = (speedKBs / 1024).toFixed(2);
                    mainSpeed.innerText = speedMBs;
                    mainUnit.innerText = "MB/s";
                    dlBytes.innerText = `${speedMBs} MB/s`;
                }
                dlBits.innerText = `${speedMbps.toFixed(2)} Mbps`;

                // Gauge Rotation Based strictly on Real Mbps (Scale up to max 10 Mbps for precision on slow connections)
                let angle = Math.min((speedMbps / 10) * 180 - 45, 135);
                gaugeRing.style.transform = `rotate(${angle}deg)`;

            } catch (err) {
                console.error(err);
                errDiv.style.display = "block";
                errDiv.innerText = "Download pipeline failed. No fake data allowed.";
                resetBtn(btn);
                return;
            }

            // 3. PURE UPLOAD
            try {
                // Sending direct raw bytes array to calculate genuine upload pipe speed
                const uploadData = new Uint8Array(300000); // Strict 300KB file chunk
                const ulStart = performance.now();

                await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: uploadData,
                    cache: 'no-store'
                });

                const ulEnd = performance.now();
                const totalUlDurationSec = (ulEnd - ulStart) / 1000;
                
                const ulKBs = (uploadData.length / 1024) / totalUlDurationSec;
                const ulMbps = ((uploadData.length * 8) / totalUlDurationSec) / (1024 * 1024);

                if (ulKBs < 1024) {
                    ulBytes.innerText = `${Math.round(ulKBs)} KB/s`;
                } else {
                    ulBytes.innerText = `${(ulKBs / 1024).toFixed(2)} MB/s`;
                }
                ulBits.innerText = `${ulMbps.toFixed(2)} Mbps`;

            } catch (err) {
                console.error(err);
                errDiv.style.display = "block";
                errDiv.innerText = "Upload pipeline failed. No fake data allowed.";
            }

            resetBtn(btn);
        }

        function resetBtn(btn) {
            btn.disabled = false;
            btn.innerText = "Run Honest Test";
        }
    </script>
</body>
</html>
