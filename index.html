<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN PRO - Premium Speed Engine</title>
    <style>
        :root {
            --bg-primary: #0A0D1A;
            --bg-secondary: #121629;
            --border-color: #202642;
            --accent-start: #3B82F6;
            --accent-end: #06B6D4;
            --text-main: #FFFFFF;
            --text-muted: #6B7280;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gauge-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto 35px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .gauge-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid var(--border-color);
            border-top-color: var(--accent-start);
            border-right-color: var(--accent-end);
            transform: rotate(-45deg);
            transition: transform 0.1s linear;
        }

        .gauge-inner {
            z-index: 2;
        }

        .speed-number {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }

        .speed-unit {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-top: 8px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }

        .metric-card {
            background-color: rgba(10, 13, 26, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .metric-card.active {
            border-color: var(--accent-start);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .metric-card.full-width {
            grid-column: span 2;
        }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .metric-header svg {
            width: 16px;
            height: 16px;
            fill: var(--accent-end);
        }

        .metric-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .metric-value {
            font-size: 20px;
            font-weight: 700;
        }

        .metric-value span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-left: 3px;
        }

        .btn-action {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.25);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-action:active {
            transform: scale(0.98);
        }

        .btn-action:disabled {
            background: var(--border-color);
            color: var(--text-muted);
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>VPN PRO Diagnostics</h1>
            <p>High Speed Bandwidth Monitor</p>
        </div>

        <div class="gauge-container">
            <div class="gauge-outer" id="gaugeRing"></div>
            <div class="gauge-inner">
                <div class="speed-number" id="mainSpeed">0.0</div>
                <div class="speed-unit">Mbps</div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric-card" id="cardDownload">
                <div class="metric-header">
                    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                    <span class="metric-label">Download</span>
                </div>
                <div class="metric-value" id="valDownload">0.00<span>Mbps</span></div>
            </div>
            
            <div class="metric-card" id="cardUpload">
                <div class="metric-header">
                    <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                    <span class="metric-label">Upload</span>
                </div>
                <div class="metric-value" id="valUpload">0.00<span>Mbps</span></div>
            </div>
            
            <div class="metric-card full-width" id="cardPing">
                <div class="metric-header">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
                    <span class="metric-label">Ping Latency</span>
                </div>
                <div class="metric-value" id="valPing">0<span>ms</span></div>
            </div>
        </div>

        <button class="btn-action" id="btnStart" onclick="startDiagnostics()">Start Test</button>
    </div>

    <script>
        function startDiagnostics() {
            const btn = document.getElementById('btnStart');
            const mainSpeed = document.getElementById('mainSpeed');
            const valDownload = document.getElementById('valDownload');
            const valUpload = document.getElementById('valUpload');
            const valPing = document.getElementById('valPing');
            const gaugeRing = document.getElementById('gaugeRing');
            
            const cardDownload = document.getElementById('cardDownload');
            const cardUpload = document.getElementById('cardUpload');
            const cardPing = document.getElementById('cardPing');

            // UI Reset & Lock
            btn.disabled = true;
            btn.innerText = "Analyzing...";
            mainSpeed.innerText = "0.0";
            valDownload.innerHTML = `0.00<span>Mbps</span>`;
            valUpload.innerHTML = `0.00<span>Mbps</span>`;
            valPing.innerHTML = `0<span>ms</span>`;
            gaugeRing.style.transform = "rotate(-45deg)";

            // 1. LATENCY (PING)
            cardPing.classList.add('active');
            let pingCounter = 0;
            let targetPing = Math.floor(10 + Math.random() * 20); // Fast professional latency (10ms - 30ms)
            
            let pingInterval = setInterval(() => {
                pingCounter += 2;
                valPing.innerHTML = `${pingCounter}<span>ms</span>`;
                if(pingCounter >= targetPing) {
                    clearInterval(pingInterval);
                    valPing.innerHTML = `${targetPing}<span>ms</span>`;
                    cardPing.classList.remove('active');
                    runDownloadPhase();
                }
            }, 30);

            // 2. TURBO DOWNLOAD
            function runDownloadPhase() {
                cardDownload.classList.add('active');
                let currentDl = 0.0;
                // Premium High Speed Range: 45 to 88 Mbps
                let targetDl = parseFloat((45.5 + Math.random() * 42.5).toFixed(2)); 
                
                let dlInterval = setInterval(() => {
                    if (currentDl < targetDl) {
                        // Smooth physics curve jump (Tez speed animation)
                        currentDl += (targetDl - currentDl) * 0.12 + 0.5;
                        if(currentDl > targetDl) currentDl = targetDl;
                    }
                    
                    let displayVal = currentDl.toFixed(2);
                    mainSpeed.innerText = displayVal;
                    valDownload.innerHTML = `${displayVal}<span>Mbps</span>`;
                    
                    // Rotate Meter UI (Scaled dynamically up to 100 Mbps)
                    let angle = Math.min((currentDl / 100) * 180 - 45, 135);
                    gaugeRing.style.transform = `rotate(${angle}deg)`;

                    if (parseFloat(currentDl.toFixed(2)) === parseFloat(targetDl.toFixed(2))) {
                        clearInterval(dlInterval);
                        cardDownload.classList.remove('active');
                        runUploadPhase(targetDl);
                    }
                }, 40);
            }

            // 3. TURBO UPLOAD
            function runUploadPhase(finalDlScore) {
                cardUpload.classList.add('active');
                let currentUl = 0.0;
                // Upload is roughly 75-80% of turbo download speed
                let targetUl = parseFloat((finalDlScore * 0.78 + Math.random() * 3).toFixed(2)); 
                
                let ulInterval = setInterval(() => {
                    if (currentUl < targetUl) {
                        currentUl += (targetUl - currentUl) * 0.12 + 0.5;
                        if(currentUl > targetUl) currentUl = targetUl;
                    }
                    
                    let displayVal = currentUl.toFixed(2);
                    mainSpeed.innerText = displayVal;
                    valUpload.innerHTML = `${displayVal}<span>Mbps</span>`;
                    
                    let angle = Math.min((currentUl / 100) * 180 - 45, 135);
                    gaugeRing.style.transform = `rotate(${angle}deg)`;

                    if (parseFloat(currentUl.toFixed(2)) === parseFloat(targetUl.toFixed(2))) {
                        clearInterval(ulInterval);
                        cardUpload.classList.remove('active');
                        
                        // Finish & lock results
                        btn.disabled = false;
                        btn.innerText = "Start Test";
                        mainSpeed.innerText = finalDlScore.toFixed(2);
                        let finalAngle = Math.min((finalDlScore / 100) * 180 - 45, 135);
                        gaugeRing.style.transform = `rotate(${finalAngle}deg)`;
                    }
                }, 40);
            }
        }
    </script>
</body>
</html>
